site_name: openseespy-solvers
site_description: scipy-style PythonSparse solvers for OpenSeesPy
# RTD sets READTHEDOCS_CANONICAL_URL (e.g. …/en/stable/) so internal links keep the version prefix.
site_url: !ENV [READTHEDOCS_CANONICAL_URL, 'http://127.0.0.1:8000/']
repo_url: https://github.com/gaaraujo/openseespy-solvers
repo_name: gaaraujo/openseespy-solvers

hooks:
  - docs/hooks.py

theme:
  name: material
  palette:
    - scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.path
    - navigation.sections
    - navigation.expand
    - content.code.copy
    - search.suggest

plugins:
  - search
  - mkdocstrings:
      default_handler: python
      handlers:
        python:
          paths: [src]
          options:
            docstring_style: numpy
            show_source: true
            show_root_heading: true
            show_symbol_type_heading: true
            members_order: source
            separate_signature: true
            merge_init_into_class: true
            show_signature_annotations: true
            signature_crossrefs: true

markdown_extensions:
  - admonition
  - attr_list
  - pymdownx.arithmatex:
      generic: true
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets:
      base_path: ["."]
  - toc:
      permalink: true
  - tables

nav:
  - Get Started:
      - Home: index.md
      - Installation: installation.md
      - Tutorial: getting-started.md
      - Examples: examples.md
  - User Guide:
      - PythonSparse interface: user-guide/pythonsparse-interface.md
      - Solver objects: user-guide/solver-objects.md
      - to_openseespy: user-guide/to-openseespy.md
      - Preconditioners: user-guide/preconditioners.md
  - API Reference:
      - Overview: api/index.md
      - scipy: api/scipy.md
      - scipy.precond: api/precond.md
      - cupy: api/cupy.md
      - cupy.precond: api/precond_cupy.md
      - nvmath: api/nvmath.md
      - hybrid: api/hybrid.md
      - Exceptions: api/exceptions.md
  - Development:
      - Adding a solver: adding-a-solver.md
      - Release notes: changelog.md

extra_javascript:
  - javascripts/mathjax.js
  - https://unpkg.com/mathjax@3/es5/tex-mml-chtml.js

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/gaaraujo/openseespy-solvers
